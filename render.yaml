services:
  - type: web
    name: elocate-web
    env: node
    plan: free
    region: oregon
    branch: main
    buildCommand: |
      npm ci
      npm run build
    startCommand: npm run start
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: elocate-db
          property: connectionString
      - key: NEXT_PUBLIC_MAPBOX_ACCESS_TOKEN
        sync: false # You MUST add the value manually in the Render Dashboard